<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral Feeds - 瞬息流</title>
    
    <script src="https://cdn.bootcdn.net/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-overlay">
        <h1>EPHEMERAL FEEDS</h1>
        <p class="subtitle">信息如过眼云烟，永远不要回头。识别真伪，击碎谎言。</p>
        <div class="controls-guide">
            自动前进 &nbsp;&bull;&nbsp; [A] / [←] 后退 &nbsp;&bull;&nbsp; [SPACE] 跳跃 (单次) &nbsp;&bull;&nbsp; [S] / [↓] 重踩破碎
        </div>
        <p class="start-prompt">按下任意键开始您的旅程</p>
    </div>

    <div id="background-layer">
        <div id="bg-meta">CATEGORY // TIMESTAMP</div>
        <div id="bg-title">WAITING FOR SIGNAL...</div>
        <div id="bg-summary">
            </div>
    </div>

    <div id="score-display">0</div>

    <div id="game-world">
        <div id="player" class="character"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
