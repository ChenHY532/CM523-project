<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral Feeds - 瞬息流</title>
    
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-overlay">
        <h1>EPHEMERAL FEEDS</h1>
        <p class="subtitle">News flows like smoke — never look back. Tell truth from lies, and smash them.</p>
        <div class="controls-guide">
            Auto-run &nbsp;&bull;&nbsp; [SPACE] / Tap — Jump &nbsp;&bull;&nbsp; [SPACE ×2] / Double-tap in air — Stomp
        </div>
        <p class="start-prompt">Tap or press any key to begin your run</p>
    </div>

    <div id="background-layer">
        <div id="bg-meta">CATEGORY // TIMESTAMP</div>
        <div id="bg-title">WAITING FOR SIGNAL...</div>
        <div id="bg-summary">
            </div>
    </div>

    <div id="score-display">0</div>

    <div id="game-world">
        <div id="player" class="character"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
