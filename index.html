<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral Feeds</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-overlay">
        <h1>EPHEMERAL FEEDS</h1>
        <p class="subtitle">Information is but fleeting smoke—never look back. Discern truth from falsehood; shatter the lies.</p>
        <div class="controls-guide">
            [WASD] / [←↑↓→] Move &nbsp;&bull;&nbsp; [SPACE] Jump  &nbsp;&bull;&nbsp; [S] / [↓] Crushed by a Heavy Stomp
        </div>
        <p class="start-prompt">Press any key to start</p>
    </div>

    <div id="background-layer">
        <div id="bg-meta">CATEGORY // TIMESTAMP</div>
        <div id="bg-title">WAITING FOR SIGNAL...</div>
        <div id="bg-summary">
            </div>
    </div>

    <div id="game-world">
        <div id="player" class="character"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
